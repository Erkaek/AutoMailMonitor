name: Release on Push (Electron)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # electron-builder code signing (lu automatiquement)
      CSC_LINK: ${{ secrets.CODE_SIGNING_CERT_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
      # Publication GitHub via electron-builder
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Read version from package.json
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          if (-not $v) { Write-Error "Version introuvable dans package.json" }
          $tag = "v$v"
          Write-Host "Version=$v Tag=$tag"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Check if release already exists
        id: check_release
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $exists = "false"
          gh release view $tag --repo "${{ github.repository }}" 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) { $exists = "true" }
          $global:LASTEXITCODE = 0
          Write-Host "Release $tag exists: $exists"
          "exists=$exists" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0

      - name: Install dependencies
        if: steps.check_release.outputs.exists != 'true'
        run: npm ci

      - name: Build & Publish (electron-builder → GitHub release)
        if: steps.check_release.outputs.exists != 'true'
        shell: pwsh
        run: |
          # electron-builder lit les secrets CSC_* pour la signature et GH_TOKEN
          # pour publier sur la release. Le tag publié = "v" + version package.json.
          npx electron-builder --win --x64 --publish always
          if ($LASTEXITCODE -ne 0) { Write-Error "electron-builder a échoué" }

      - name: Skip notice
        if: steps.check_release.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} existe déjà — build sauté. Bump la version dans package.json pour publier."

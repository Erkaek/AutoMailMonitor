name: Release on Push (Windows .NET)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CODE_SIGNING_CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT_BASE64 }}
      CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content app/MailMonitor.csproj
          $v = $proj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1
          if (-not $v) { Write-Error "Version introuvable dans MailMonitor.csproj" }
          $tag = "v$v"
          Write-Host "Version=$v Tag=$tag"
          "version=$v"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Check if release already exists
        id: check_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $exists = "false"
          try {
            gh release view $tag --repo "${{ github.repository }}" 1>$null 2>$null
            if ($LASTEXITCODE -eq 0) { $exists = "true" }
          } catch { $exists = "false" }
          Write-Host "Release $tag exists: $exists"
          "exists=$exists" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        if: steps.check_release.outputs.exists != 'true'
        run: dotnet restore app/MailMonitor.csproj

      - name: Publish (single-file, self-contained win-x64)
        if: steps.check_release.outputs.exists != 'true'
        run: >
          dotnet publish app/MailMonitor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=embedded
          -o publish

      - name: Stage release artifact
        if: steps.check_release.outputs.exists != 'true'
        id: stage
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $src = "publish/MailMonitor.exe"
          if (-not (Test-Path $src)) {
            Write-Error "MailMonitor.exe introuvable dans publish/"
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $dest = "artifacts/MailMonitor-v$version.exe"
          Copy-Item $src $dest
          Write-Host "Artifact: $dest"
          "artifact=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign Windows executable
        if: steps.check_release.outputs.exists != 'true' && env.CODE_SIGNING_CERT_BASE64 != '' && env.CODE_SIGNING_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGNING_CERT_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -match 'x64\\signtool.exe$' } |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { Write-Error "signtool.exe introuvable" }
          Write-Host "signtool: $signtool"
          & $signtool sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" `
            /f $pfxPath /p $env:CODE_SIGNING_CERT_PASSWORD `
            "${{ steps.stage.outputs.artifact }}"
          if ($LASTEXITCODE -ne 0) { Write-Error "Signature échouée" }
          Remove-Item $pfxPath -Force

      - name: Compute SHA256
        if: steps.check_release.outputs.exists != 'true'
        shell: pwsh
        run: |
          $artifact = "${{ steps.stage.outputs.artifact }}"
          $hash = (Get-FileHash $artifact -Algorithm SHA256).Hash
          "$hash  $(Split-Path $artifact -Leaf)" | Out-File -FilePath "$artifact.sha256" -Encoding ascii
          Write-Host "SHA256=$hash"

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $artifact = "${{ steps.stage.outputs.artifact }}"
          $sha = "$artifact.sha256"
          $notes = "Mail Monitor $tag`n`nBuild automatique depuis main."
          gh release create $tag $artifact $sha `
            --repo "${{ github.repository }}" `
            --title "Mail Monitor $tag" `
            --notes "$notes"
          if ($LASTEXITCODE -ne 0) { Write-Error "gh release create a échoué" }

      - name: Skip notice
        if: steps.check_release.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} existe déjà — build sauté. Bump <Version> dans app/MailMonitor.csproj pour publier une nouvelle release."
